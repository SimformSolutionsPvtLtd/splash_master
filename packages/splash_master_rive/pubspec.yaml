name: splash_master_rive
description: "Rive animation splash screen widget for splash_master."
version: 1.0.0
repository: https://github.com/SimformSolutionsPvtLtd/splash_master
issue_tracker: https://github.com/SimformSolutionsPvtLtd/splash_master/issues
topics:
  - splash-screen
  - flutter-splash-screen
  - rive
  - rive-animation
  - rive-splash
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  splash_master:
    path: ../../ # Core package providing shared types and native splash generation
  rive: 0.14.5 # Renders Rive animation files in the splash screen

dev_dependencies:
  flutter_lints: ^3.0.0 # Dart/Flutter lint rules for code quality

screenshots:
  - description: 'This screenshot showcases rive as splash screen for ios.'
    path: preview/ios_rive_splash.gif
  - description: 'This screenshot showcases rive as splash screen for android.'
    path: preview/android_rive_splash.gif