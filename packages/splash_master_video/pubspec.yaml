name: splash_master_video
description: "Video splash screen widget for splash_master."
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  splash_master:
    path: ../../ # Core package providing shared types and native splash generation
  video_player: 2.9.1 # Plays video files in the splash screen widget

dev_dependencies:
  flutter_lints: 3.0.0 # Dart/Flutter lint rules for code quality

screenshots:
  - description: 'This screenshot showcases video as splash screen for ios.'
    path: preview/ios_video_splash.gif
  - description: 'This screenshot showcases video as splash screen for android.'
    path: preview/android_video_splash.gif