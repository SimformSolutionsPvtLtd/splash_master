name: splash_master_video
description: "Video splash screen widget for splash_master."
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.4.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  splash_master:
    path: ../../
  video_player: ^2.9.1

dev_dependencies:
  flutter_lints: ^3.0.0

screenshots:
  - description: 'This screenshot showcases video as splash screen for ios.'
    path: preview/ios_video_splash.gif
  - description: 'This screenshot showcases video as splash screen for android.'
    path: preview/android_video_splash.gif